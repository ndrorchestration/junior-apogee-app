<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Junior Apogee – Agent Evaluation Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body>
    <div id="capability-matrix-chart" style="width:100%;height:400px;"></div>

    <script>
      const data = [
        {
          type: "scatterpolar",
          r: [85, 90, 70, 80, 95, 85],
          theta: ["Reasoning", "Coding", "Memory", "Tools", "Safety", "Reasoning"],
          fill: "toself",
          name: "Agent Alpha",
          line: { color: "#6366f1" },
          marker: { color: "#6366f1" },
        },
      ];

      const layout = {
        polar: {
          radialaxis: { visible: true, range: [0, 100], color: "#9ca3af" },
          angularaxis: { color: "#e5e7eb" },
          bgcolor: "rgba(0,0,0,0)",
        },
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        showlegend: false,
        margin: { l: 40, r: 40, t: 40, b: 40 },
        font: { color: "#e5e7eb", family: "system-ui" },
      };

      const config = { responsive: true, displayModeBar: false };

      document.addEventListener("DOMContentLoaded", () => {
        Plotly.newPlot("capability-matrix-chart", data, layout, config);
      });
    </script>
  </body>
</html>
