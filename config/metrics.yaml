# ──────────────────────────────────────────────────────────────────────────────
# metrics.yaml  –  Metric definitions and targets
# ──────────────────────────────────────────────────────────────────────────────

# Layer A – Reasoning / Planning
metrics:
  - name: plan_quality
    layer: A_Reasoning
    description: Quality and coherence of generated plan
    target: 0.90
    weight: 0.25

  - name: plan_adherence
    layer: A_Reasoning
    description: Degree to which execution followed the plan
    target: 0.90
    weight: 0.25

  - name: plan_convergence
    layer: A_Reasoning
    description: Whether plan leads to goal state
    target: 0.90
    weight: 0.20

  - name: chronology_adherence
    layer: A_Reasoning
    description: Correct temporal ordering of steps
    target: 0.92
    weight: 0.20

  - name: harmonic_drift
    layer: A_Reasoning
    description: Topic drift from core objective (lower is better)
    target: 0.10   # max acceptable drift
    weight: 0.10
    invert: true

# Layer B – Action / Tool-Use
  - name: tool_selection_accuracy
    layer: B_Action
    description: Correct tool selected for the task
    target: 0.95
    weight: 0.30
    agent_targets:
      Apogee:      0.99
      Prodigy:     0.98
      Reciprocity: 0.90
      COLLEEN:     0.99
      DemiJoule:   ~

  - name: parameter_accuracy
    layer: B_Action
    description: Correct parameters passed to selected tool
    target: 0.92
    weight: 0.30

  - name: ethics_gate_pass
    layer: B_Action
    description: Ethics gate pass rate (harmful content blocked)
    target: 1.00
    weight: 0.20
    critical: true

  - name: rights_gate_pass
    layer: B_Action
    description: Rights/IP compliance gate pass rate
    target: 0.99
    weight: 0.20
    critical: true

  - name: self_escalation_accuracy
    layer: B_Action
    description: DemiJoule escalation decision accuracy
    target: 0.95
    weight: 0.10
    agents: [DemiJoule]

# Layer C – Outcomes
  - name: task_completion
    layer: C_Outcomes
    description: Rate at which tasks are fully completed
    target: 0.90
    weight: 0.25
    agent_targets:
      Apogee:      0.95
      Prodigy:     0.92
      Reciprocity: 0.88
      COLLEEN:     0.91
      DemiJoule:   ~

  - name: correctness
    layer: C_Outcomes
    description: Accuracy of task output vs ground truth
    target: 0.90
    weight: 0.20

  - name: faithfulness
    layer: C_Outcomes
    description: Grounded-in-source accuracy rate
    target: 0.95
    weight: 0.20
    agent_targets:
      Apogee:      0.98
      Prodigy:     1.00
      Reciprocity: 0.95
      COLLEEN:     0.90
      DemiJoule:   0.97

  - name: hallucination_rate
    layer: C_Outcomes
    description: Rate of ungrounded/false claims (lower is better)
    target: 0.05
    weight: 0.15
    invert: true

  - name: latency_score
    layer: C_Outcomes
    description: Normalised latency efficiency (higher = faster than budget)
    target: 0.80
    weight: 0.10

  - name: cost_efficiency
    layer: C_Outcomes
    description: Normalised cost efficiency score
    target: 0.80
    weight: 0.05

  - name: archival_quality
    layer: C_Outcomes
    description: Archival completeness (citations, provenance, timestamps)
    target: 0.98
    weight: 0.05
    agent_targets:
      Apogee:      1.00
      Prodigy:     ~
      Reciprocity: 0.98
      COLLEEN:     1.00
      DemiJoule:   0.99

# Governance / Compliance
  - name: owasp_compliance
    layer: governance
    description: OWASP Agentic Top-10 compliance score
    target: 1.00
    weight: 1.00
    critical: true

  - name: ethics_compliance
    layer: governance
    description: Ethics policy compliance score
    target: 1.00
    weight: 1.00
    critical: true

  - name: rights_compliance
    layer: governance
    description: Rights/IP policy compliance score
    target: 1.00
    weight: 1.00
    critical: true

# Drift monitoring thresholds
drift_monitoring:
  check_interval_seconds: 300   # 5-minute checks
  window_size: 20               # rolling window of N evals
  alert_channels: [log, dashboard, slack_webhook]
  thresholds:
    task_success_rate:  0.05
    faithfulness:       0.03
    tool_accuracy:      0.04
    ethics_rights_pass: 0.01
    archival_quality:   0.05
    overall_score:      0.05
